<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Elgato Icons — Font Test</title>
		<link rel="stylesheet" href="font/elgato-icons.css" />
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: system-ui, sans-serif;
				background: #1a1a1a;
				color: #e0e0e0;
				padding: 32px;
			}

			h1 {
				font-size: 1.25rem;
				font-weight: 600;
				margin-bottom: 8px;
				color: #fff;
			}

			.meta {
				font-size: 0.8rem;
				color: #888;
				margin-bottom: 28px;
			}

			.search {
				display: block;
				width: 100%;
				max-width: 360px;
				padding: 8px 12px;
				margin-bottom: 28px;
				background: #2a2a2a;
				border: 1px solid #3a3a3a;
				border-radius: 6px;
				color: #e0e0e0;
				font-size: 0.875rem;
				outline: none;
			}

			.search:focus {
				border-color: #555;
			}

			.size-controls {
				display: flex;
				align-items: center;
				gap: 12px;
				margin-bottom: 28px;
				font-size: 0.8rem;
				color: #888;
			}

			.size-controls input {
				accent-color: #0ea5e9;
				cursor: pointer;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
				gap: 8px;
			}

			.icon-card {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
				padding: 16px 8px;
				background: #242424;
				border: 1px solid #2e2e2e;
				border-radius: 8px;
				cursor: pointer;
				transition:
					background 0.15s,
					border-color 0.15s;
			}

			.icon-card:hover {
				background: #2e2e2e;
				border-color: #444;
			}

			.icon-card i {
				display: block;
				line-height: 1;
			}

			.icon-card .label {
				font-size: 0.65rem;
				color: #777;
				text-align: center;
				word-break: break-all;
				line-height: 1.3;
			}

			.icon-card.copied {
				border-color: #0ea5e9;
			}

			.empty {
				grid-column: 1 / -1;
				text-align: center;
				color: #555;
				padding: 48px 0;
				font-size: 0.875rem;
			}

			#count {
				color: #0ea5e9;
			}
		</style>
	</head>
	<body>
		<h1>Elgato Icons — Font</h1>
		<p class="meta"><span id="count">…</span> icons &nbsp;·&nbsp; click any card to copy class name</p>

		<input class="search" type="search" placeholder="Filter icons…" id="search" autocomplete="off" />

		<div class="size-controls">
			<label for="sizeRange">Size</label>
			<input type="range" id="sizeRange" min="12" max="48" value="20" step="2" />
			<span id="sizeLabel">20px</span>
		</div>

		<div class="grid" id="grid"></div>

		<script>
			fetch("font/info.json")
				.then((r) => r.json())
				.then((info) => {
					const icons = Object.entries(info).map(([name, data]) => ({
						name,
						className: data.className,
					}));

					document.getElementById("count").textContent = icons.length;

					const grid = document.getElementById("grid");
					const sizeRange = document.getElementById("sizeRange");
					const sizeLabel = document.getElementById("sizeLabel");
					const search = document.getElementById("search");

					function render(filter = "") {
						const lower = filter.toLowerCase();
						const filtered = filter ? icons.filter((i) => i.name.includes(lower)) : icons;

						grid.innerHTML = "";

						if (filtered.length === 0) {
							grid.innerHTML = `<p class="empty">No icons match "${filter}"</p>`;
							return;
						}

						const size = sizeRange.value + "px";

						for (const icon of filtered) {
							const card = document.createElement("div");
							card.className = "icon-card";
							card.title = icon.className;

							const i = document.createElement("i");
							i.className = icon.className;
							i.style.fontSize = size;

							const label = document.createElement("span");
							label.className = "label";
							label.textContent = icon.name;

							card.appendChild(i);
							card.appendChild(label);

							card.addEventListener("click", () => {
								navigator.clipboard?.writeText(icon.className);
								card.classList.add("copied");
								setTimeout(() => card.classList.remove("copied"), 800);
							});

							grid.appendChild(card);
						}
					}

					render();

					sizeRange.addEventListener("input", () => {
						sizeLabel.textContent = sizeRange.value + "px";
						grid.querySelectorAll("i").forEach((i) => {
							i.style.fontSize = sizeRange.value + "px";
						});
					});

					search.addEventListener("input", () => render(search.value));
				})
				.catch(() => {
					document.getElementById("grid").innerHTML =
						`<p class="empty">Could not load font/info.json — make sure you're running a local server.</p>`;
				});
		</script>
	</body>
</html>
